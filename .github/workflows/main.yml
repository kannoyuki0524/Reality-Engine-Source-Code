# This is a basic workflow to help you get started with Actions

name: Build

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule: 
    - cron: '0 0 */6 * *'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  Desktop:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with: 
          haxe-version: 4.3.7

      - name: Restore Previous Haxelibs
        id: cache-debug-build-haxelib-restore
        uses: actions/cache/restore@main
        with:
          path: |
            ~/haxelib
          key: cache-build-haxelib

      - name: Install Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib --global install hmm --quiet
          haxelib run hmm install --quiet

      - name: Clearing existed haxelib cache
        uses: actions/github-script@main
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            for (const cache of caches.data.actions_caches) {
              if (cache.key == "cache-build-haxelib") {
                console.log('Clearing ' + cache.key + '...')
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                })
                console.log("Cache cleared.")
              }
            }
          
      - name: Uploading new haxelib cache
        uses: actions/cache/save@main
        with:
          key: cache-build-haxelib
          path: |
            ~/haxelib

      - name: Restore Previous Windows build Cache
        if: startsWith(matrix.os, 'windows')
        id: cache-debug-build-windows-restore
        uses: actions/cache/restore@main
        with:
          path: |
            export\release\windows\
          key: cache-build-windows

      - name: Compile (Windows)
        if: startsWith(matrix.os, 'windows')
        run: haxelib run lime build windows

      - name: Upload Artifact (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: actions/upload-artifact@main
        with:
          name: windowsBuild
          path: export\release\windows\bin\*
          include-hidden-files: true
          if-no-files-found: error

          
      - name: Clearing existed windows build cache
        if: startsWith(matrix.os, 'windows')
        uses: actions/github-script@main
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            for (const cache of caches.data.actions_caches) {
              if (cache.key == "cache-build-windows") {
                console.log('Clearing ' + cache.key + '...')
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                })
                console.log("Cache cleared.")
              }
            }
          
      - name: Uploading new windows build cache
        if: startsWith(matrix.os, 'windows')
        uses: actions/cache/save@main
        with:
          key: cache-build-windows
          path: |
            export\release\windows\

            
      - name: Restore Previous Linux build Cache
        if: startsWith(matrix.os, 'ubuntu')
        id: cache-debug-build-linux-restore
        uses: actions/cache/restore@main
        with:
          path: |
            export/release/neko/
            export/release/linux/
          key: cache-build-linux

      - name: Compile (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: haxelib run lime build linux

      - name: Upload Artifact (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@main
        with:
          name: linuxBuild
          path: export/release/linux/bin/*
          include-hidden-files: true
          if-no-files-found: error

      - name: Clearing existed linux build cache
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/github-script@main
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            for (const cache of caches.data.actions_caches) {
              if (cache.key == "cache-build-linux") {
                console.log('Clearing ' + cache.key + '...')
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                })
                console.log("Cache cleared.")
              }
            }
          
      - name: Uploading new linux build cache
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/cache/save@main
        with:
          key: cache-build-linux
          path: |
            export/release/neko/
            export/release/linux/

      - name: Restore Previous MacOS build Cache
        if: startsWith(matrix.os, 'macos')
        id: cache-debug-build-macos-restore
        uses: actions/cache/restore@main
        with:
          path: |
            export/release/macos/
          key: cache-build-macos

      - name: Compile (macOS)
        if: startsWith(matrix.os, 'macos')
        run: haxelib run lime build mac

      - name: Upload Artifact (macOS)
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@main
        with:
          name: macOSBuild
          path: export/release/macos/bin/*
          include-hidden-files: true
          if-no-files-found: error

      - name: Clearing existed macos build cache
        if: startsWith(matrix.os, 'macos')
        uses: actions/github-script@main
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            for (const cache of caches.data.actions_caches) {
              if (cache.key == "cache-build-macos") {
                console.log('Clearing ' + cache.key + '...')
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                })
                console.log("Cache cleared.")
              }
            }
          
      - name: Uploading new macos build cache
        if: startsWith(matrix.os, 'macos')
        uses: actions/cache/save@v4
        with:
          key: cache-build-macos
          path: |
            export/release/macos/
     

  Mobile:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Android NDK
        if: startsWith(matrix.os, 'ubuntu')
        uses: nttld/setup-ndk@main
        id: setup-ndk
        with:
          ndk-version: r21e

      - name: Setup Java JDK
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/setup-java@main
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - name: Restore Previous Haxelibs
        id: cache-debug-build-haxelib-restore
        uses: actions/cache/restore@main
        with:
          path: |
            ~/haxelib
          key: cache-build-haxelib

      - name: Install Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib --global install hmm --quiet
          haxelib run hmm install --quiet
          
      - name: Clearing existed haxelib cache
        uses: actions/github-script@main
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            for (const cache of caches.data.actions_caches) {
              if (cache.key == "cache-build-haxelib") {
                console.log('Clearing ' + cache.key + '...')
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                })
                console.log("Cache cleared.")
              }
            }
          
      - name: Uploading new haxelib cache
        uses: actions/cache/save@main
        with:
          key: cache-build-haxelib
          path: |
            ~/haxelib

      - name: Configure Android
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME 
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true
          haxelib list
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Restore Previous Android build Cache
        if: startsWith(matrix.os, 'ubuntu')
        id: cache-debug-build-android-restore
        uses: actions/cache/restore@main
        with:
          path: |
            export/release/android/
          key: cache-build-android

      - name: Compile (Android)
        if: startsWith(matrix.os, 'ubuntu')
        run: haxelib run lime build android

      - name: Upload Artifact (Android)
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@main
        with:
          name: androidBuild
          path: export/release/android/bin/app/build/outputs/apk/release/*
          include-hidden-files: true
          if-no-files-found: error

      - name: Clearing existed android build cache
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/github-script@main
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            for (const cache of caches.data.actions_caches) {
              if (cache.key == "cache-build-android") {
                console.log('Clearing ' + cache.key + '...')
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                })
                console.log("Cache cleared.")
              }
            }
          
      - name: Uploading new android build cache
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/cache/save@v4
        with:
          key: cache-build-android
          path: |
            export/release/android/

      - name: Restore Previous iOS build Cache
        if: startsWith(matrix.os, 'macos')
        id: cache-debug-build-ios-restore
        uses: actions/cache/restore@main
        with:
          path: |
            export/release/ios/
          key: cache-build-ios

      - name: Compile (iOS)
        if: startsWith(matrix.os, 'macos')
        run: haxelib run lime build ios -nosign

      - name: Make Ipa
        if: startsWith(matrix.os, 'macos')
        run: |
          cd export/release/ios/build/*-iphoneos
          mkdir Payload
          mv *.app Payload
          zip -r RealityEngine.ipa Payload

      - name: Upload Artifact (iOS)
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@main
        with:
          name: iOSBuild
          path: export/release/ios/build/Release-iphoneos/*
          include-hidden-files: true
          if-no-files-found: error

      - name: Clearing existed ios build cache
        if: startsWith(matrix.os, 'macos')
        uses: actions/github-script@main
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            for (const cache of caches.data.actions_caches) {
              if (cache.key == "cache-build-ios") {
                console.log('Clearing ' + cache.key + '...')
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                })
                console.log("Cache cleared.")
              }
            }
          
      - name: Uploading new ios build cache
        if: startsWith(matrix.os, 'macos')
        uses: actions/cache/save@v4
        with:
          key: cache-build-ios
          path: |
            export/release/ios/